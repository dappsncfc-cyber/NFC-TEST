<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venue Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sidebar-gradient { background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col md:flex-row">

    <!-- Sidebar Navigation -->
    <aside id="sidebar" class="w-full md:w-64 sidebar-gradient text-white p-6 md:p-8 hidden md:block">
        <h1 class="text-xl font-bold mb-10 text-sky-400">VenuePortal</h1>
        <nav class="space-y-8">
            <div>
                <h3 class="text-xs font-bold uppercase text-slate-500 mb-4 tracking-widest">Menu</h3>
                <div class="space-y-4">
                    <button onclick="showSection('dashboard')" class="w-full text-left font-semibold text-sky-300">Dashboard</button>
                </div>
            </div>
            <div>
                <h3 class="text-xs font-bold uppercase text-slate-500 mb-4 tracking-widest">Feedback</h3>
                <div id="complaints-list" class="space-y-2 text-sm text-slate-300">
                    <p class="italic text-slate-500">Loading feedback...</p>
                </div>
            </div>
        </nav>
    </aside>

    <!-- Mobile Header -->
    <header class="md:hidden p-4 bg-slate-900 text-white flex justify-between items-center">
        <span class="font-bold">VenuePortal</span>
        <button onclick="document.getElementById('sidebar').classList.toggle('hidden')">Menu</button>
    </header>

    <!-- Main Content -->
    <main class="flex-1 p-4 md:p-12 overflow-y-auto">
        <div id="dashboard" class="max-w-3xl mx-auto">
            <h2 class="text-3xl font-bold text-slate-900 mb-8">Manage Rewards</h2>
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 space-y-6">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">VIP Offer Text</label>
                    <textarea id="edit-offer" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl"></textarea>
                </div>
                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Voucher Code</label>
                        <input type="text" id="edit-code" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Daily Limit</label>
                        <input type="number" id="edit-limit" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Voucher Details</label>
                    <input type="text" id="edit-details" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Terms & Conditions</label>
                    <textarea id="edit-terms" rows="4" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl"></textarea>
                </div>
                <button onclick="updateOffer()" id="save-btn" class="w-full bg-sky-600 text-white font-bold py-4 rounded-2xl hover:bg-sky-700 transition">Save Changes</button>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDmKvSrxPI0dWcRkQZGz35x-amxYmtP40Y",
            authDomain: "offscript-nfc-landing.firebaseapp.com",
            projectId: "offscript-nfc-landing",
            storageBucket: "offscript-nfc-landing.firebasestorage.app",
            messagingSenderId: "848744026936",
            appId: "1:848744026936:web:4ce059f847d7763da0e7cd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const venueId = 'the-red-lion-cromer';

        async function init() {
            // Load Venue Data
            const snap = await getDoc(doc(db, "venues", venueId));
            if (snap.exists()) {
                const data = snap.data();
                document.getElementById('edit-offer').value = data.vipOfferText || "";
                document.getElementById('edit-code').value = data.voucherCode || "";
                document.getElementById('edit-details').value = data.voucherDetails || "";
                document.getElementById('edit-terms').value = data.voucherTerms || "";
                document.getElementById('edit-limit').value = data.dailyVoucherLimit || "";
            }

            // Load Complaints
            const complaintsSnap = await getDocs(query(collection(db, "complaints"), orderBy("timestamp", "desc")));
            const list = document.getElementById('complaints-list');
            list.innerHTML = complaintsSnap.empty ? '<p>No feedback yet.</p>' : '';
            complaintsSnap.forEach(doc => {
                const c = doc.data();
                list.innerHTML += `<div class="p-2 border-b border-slate-700">
                    <p class="font-bold text-xs">${c.name}</p>
                    <p class="text-xs truncate">${c.text}</p>
                </div>`;
            });
        }

        window.updateOffer = async () => {
            const btn = document.getElementById('save-btn');
            btn.innerText = "Saving...";
            await updateDoc(doc(db, "venues", venueId), {
                vipOfferText: document.getElementById('edit-offer').value,
                voucherCode: document.getElementById('edit-code').value,
                voucherDetails: document.getElementById('edit-details').value,
                voucherTerms: document.getElementById('edit-terms').value,
                dailyVoucherLimit: parseInt(document.getElementById('edit-limit').value)
            });
            alert("Updated.");
            btn.innerText = "Save Changes";
        };

        init();
    </script>
</body>
</html>
