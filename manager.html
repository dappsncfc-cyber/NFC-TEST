<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venue Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sidebar-gradient { background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <div class="flex flex-1">
        <!-- Sidebar Navigation -->
        <aside class="w-64 sidebar-gradient text-white p-8 hidden md:block">
            <h1 class="text-xl font-bold mb-10 text-sky-400">VenuePortal</h1>
            <nav class="space-y-4">
                <div class="w-full text-left font-semibold text-sky-300 cursor-default">Dashboard</div>
                <div class="w-full text-left font-medium text-slate-500 cursor-default">Vouchers</div>
                <div class="w-full text-left font-medium text-slate-500 cursor-default">Settings</div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-4 md:p-12">
            <div id="admin-section" class="max-w-3xl mx-auto">
                <header class="flex justify-between items-end mb-8">
                    <div>
                        <h2 class="text-3xl font-bold text-slate-900">Manage Rewards</h2>
                        <p class="text-slate-500">Update your live offer details for the guest landing page.</p>
                    </div>
                </header>
                
                <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 space-y-6">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">VIP Offer Text</label>
                        <textarea id="edit-offer" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-sky-500 outline-none"></textarea>
                    </div>
                    
                    <div class="grid md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Voucher Code</label>
                            <input type="text" id="edit-code" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Daily Limit</label>
                            <input type="number" id="edit-limit" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl" placeholder="None">
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Voucher Details</label>
                        <input type="text" id="edit-details" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl">
                    </div>
                    
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Terms & Conditions</label>
                        <textarea id="edit-terms" rows="4" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl"></textarea>
                    </div>
                    
                    <button onclick="updateOffer()" id="save-btn" class="w-full bg-sky-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-sky-200 hover:bg-sky-700 transition">Save Changes</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Footer -->
    <footer class="p-6 text-center text-slate-400 text-sm">
        &copy; <span id="year"></span> <a href="https://www.offscriptlabs.co.uk" target="_blank" class="hover:text-sky-500 transition">Offscript Labs</a>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        document.getElementById('year').innerText = new Date().getFullYear();

        const firebaseConfig = {
            apiKey: "AIzaSyDmKvSrxPI0dWcRkQZGz35x-amxYmtP40Y",
            authDomain: "offscript-nfc-landing.firebaseapp.com",
            projectId: "offscript-nfc-landing",
            storageBucket: "offscript-nfc-landing.firebasestorage.app",
            messagingSenderId: "848744026936",
            appId: "1:848744026936:web:4ce059f847d7763da0e7cd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const venueId = 'the-red-lion-cromer';

        async function init() {
            try {
                const snap = await getDoc(doc(db, "venues", venueId));
                if (snap.exists()) {
                    const data = snap.data();
                    document.getElementById('edit-offer').value = data.vipOfferText || "";
                    document.getElementById('edit-code').value = data.voucherCode || "";
                    document.getElementById('edit-details').value = data.voucherDetails || "";
                    document.getElementById('edit-terms').value = data.voucherTerms || "";
                    document.getElementById('edit-limit').value = data.dailyVoucherLimit || "";
                }
            } catch (e) { console.error("Error loading data:", e); }
        }

        window.updateOffer = async () => {
            const btn = document.getElementById('save-btn');
            const originalText = btn.innerText;
            btn.innerText = "Saving...";
            try {
                const limitVal = document.getElementById('edit-limit').value;
                await updateDoc(doc(db, "venues", venueId), {
                    vipOfferText: document.getElementById('edit-offer').value,
                    voucherCode: document.getElementById('edit-code').value,
                    voucherDetails: document.getElementById('edit-details').value,
                    voucherTerms: document.getElementById('edit-terms').value,
                    dailyVoucherLimit: limitVal ? parseInt(limitVal) : null
                });
                alert("Changes saved successfully.");
                btn.innerText = originalText;
            } catch (e) { 
                alert("Update failed."); 
                btn.innerText = originalText; 
            }
        };

        init();
    </script>
</body>
</html>
