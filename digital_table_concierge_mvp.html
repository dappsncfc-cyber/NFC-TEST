<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Welcome</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f2f5; }
        .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.05); }
        .glass-input { background: rgba(255, 255, 255, 0.5); border: 1px solid rgba(255, 255, 255, 0.8); }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex justify-center min-h-screen text-slate-800 antialiased overflow-x-hidden">

    <div class="w-full max-w-md bg-transparent min-h-screen relative pb-12 shadow-2xl overflow-hidden z-10">
        <header class="relative h-64 flex flex-col justify-end px-6 pb-8">
            <div class="absolute inset-0 z-0">
                <img id="venue-cover" src="https://placehold.co/600x400/slate/white?text=Loading" alt="Venue Cover" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-[#f0f2f5] via-black/30 to-black/10"></div>
            </div>
            <div class="relative z-10 flex items-end gap-4 w-full">
                <div class="w-20 h-20 bg-white/90 backdrop-blur-md rounded-[20px] flex items-center justify-center shadow-lg border border-white/50 p-2 overflow-hidden">
                    <span id="venue-logo-text" class="text-gray-900 font-bold text-sm tracking-widest text-center">...</span>
                    <img id="venue-logo-img" src="" alt="Logo" class="w-full h-full object-contain hidden">
                </div>
                <div class="pb-1">
                    <h1 id="venue-name" class="text-2xl font-black text-white tracking-tight drop-shadow-md">Loading...</h1>
                </div>
            </div>
        </header>

        <main class="relative z-10 px-5 space-y-6 -mt-4">
            <div class="grid grid-cols-2 gap-4">
                <section onclick="showWifiModal()" class="glass-card p-4 rounded-[24px] flex flex-col items-center justify-center gap-2 cursor-pointer active:scale-[0.98] transition-transform col-span-2 text-center">
                    <div class="w-12 h-12 bg-sky-50 rounded-full flex items-center justify-center text-sky-600">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6"><path fill-rule="evenodd" d="M1.371 8.143c5.858-5.857 15.356-5.857 21.213 0a.75.75 0 010 1.061l-1.414 1.414a.75.75 0 01-1.06 0c-4.686-4.686-12.284-4.686-16.97 0a.75.75 0 01-1.061 0l-1.414-1.414a.75.75 0 010-1.06zm3.182 3.182c4.1-4.1 10.749-4.1 14.849 0a.75.75 0 010 1.06l-1.414 1.415a.75.75 0 01-1.061 0 8.25 8.25 0 00-11.668 0 .75.75 0 01-1.06 0l-1.415-1.415a.75.75 0 010-1.06zm3.182 3.182c2.343-2.343 6.142-2.343 8.485 0a.75.75 0 010 1.06l-1.414 1.415a.75.75 0 01-1.061 0 3.75 3.75 0 00-5.304 0 .75.75 0 01-1.06 0l-1.415-1.415a.75.75 0 010-1.06zm3.182 3.182a1.5 1.5 0 012.122 0l1.414 1.414a1.5 1.5 0 01-2.122 2.121l-1.414-1.414a1.5 1.5 0 010-2.121z" clip-rule="evenodd" /></svg>
                    </div>
                    <div>
                        <h2 class="text-sm font-bold text-slate-900">Guest Wi-Fi</h2>
                        <p class="text-xs text-slate-500">Tap for details</p>
                    </div>
                </section>

                <section class="glass-card p-6 rounded-[28px] col-span-2 text-center">
                    <div class="flex flex-col items-center gap-2 mb-2"><span class="text-xl">✨</span><h2 class="text-lg font-bold text-slate-900">VIP Rewards</h2></div>
                    <p id="vip-offer-text" class="text-slate-600 text-sm mb-4">Enter your email to claim your reward.</p>
                    <form id="vip-form" onsubmit="handleVipSubmit(event)" class="space-y-3">
                        <input type="email" id="vip-email" required placeholder="Enter email address" class="w-full px-4 py-3 glass-input rounded-xl text-sm text-center">
                        <label class="flex justify-center gap-2 items-start cursor-pointer"><input type="checkbox" id="vip-consent" required class="mt-1"><span class="text-[10px] text-slate-500">I agree to receive news and exclusive offers from this venue.</span></label>
                        <button type="submit" class="w-full bg-slate-900 text-white font-bold py-3 rounded-xl">Reveal My Code</button>
                    </form>
                    <div id="vip-success" class="hidden text-center fade-in py-4">
                        <p class="text-xs font-bold uppercase text-amber-600 tracking-widest">Your Code</p>
                        <div id="voucher-code-display" class="w-full break-words text-3xl font-black py-2 font-mono tracking-widest"></div>
                        <p id="voucher-details" class="text-sm font-semibold text-slate-800 mt-1"></p>
                        <p id="voucher-terms" class="text-[10px] text-slate-500 mt-3 italic"></p>
                    </div>
                    <div id="vip-limit" class="hidden text-center text-rose-600 py-4 font-bold text-sm">Daily reward limit reached. Please check back tomorrow!</div>
                </section>
            </div>

            <section class="glass-card p-6 rounded-[28px]">
                <div id="feedback-buttons" class="space-y-3">
                    <h2 class="text-lg font-bold text-slate-900 text-center mb-2">How was your visit?</h2>
                    <button onclick="goToGoogle()" class="w-full bg-emerald-50 text-emerald-700 font-bold py-3 rounded-xl border border-emerald-100">🌟 I had a great time!</button>
                    <button onclick="showComplaintForm()" class="w-full bg-rose-50 text-rose-600 font-bold py-3 rounded-xl border border-rose-100">💬 Something went wrong</button>
                </div>
                <form id="complaint-form" onsubmit="handleComplaintSubmit(event)" class="hidden space-y-3 fade-in">
                    <textarea id="complaint-text" required placeholder="What happened?" class="w-full p-3 glass-input rounded-xl text-sm"></textarea>
                    <input type="text" id="complaint-name" required placeholder="Your Name" class="w-full p-3 glass-input rounded-xl text-sm">
                    <input type="email" id="complaint-email" required placeholder="Your Email" class="w-full p-3 glass-input rounded-xl text-sm">
                    <button type="submit" class="w-full bg-slate-900 text-white font-bold py-3 rounded-xl">Message Management</button>
                </form>
            </section>

            <section class="grid grid-cols-2 gap-4">
                <a href="#" id="book-table-link" class="glass-card p-4 flex flex-col items-center justify-center gap-1 text-center rounded-[24px] h-24">
                    <span class="text-xl">📅</span>
                    <span class="text-xs font-bold">Book Table</span>
                </a>
                <a href="#" id="instagram-link" target="_blank" class="glass-card p-4 flex flex-col items-center justify-center gap-1 text-center rounded-[24px] h-24">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/9/95/Instagram_logo_2022.svg" class="w-5 h-5 opacity-70">
                    <span class="text-xs font-bold">Instagram</span>
                </a>
            </section>
        </main>
        
        <footer class="text-center pt-8 pb-4">
            <p class="text-[10px] text-slate-400">&copy; <span id="year"></span> <a href="https://www.offscriptlabs.co.uk" target="_blank" class="hover:underline">Offscript Labs</a></p>
        </footer>
    </div>

    <div id="wifi-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="glass-card p-6 rounded-2xl w-full max-w-xs text-center">
            <h3 class="font-bold mb-1">Wi-Fi Network</h3>
            <p id="wifi-network-display" class="text-sm text-slate-600 mb-4"></p>
            <h3 class="font-bold mb-1">Password</h3>
            <p id="wifi-password-display" class="text-2xl font-mono font-bold mb-6">...</p>
            <button onclick="document.getElementById('wifi-modal').classList.add('hidden')" class="w-full bg-slate-900 text-white font-bold py-2 rounded-lg text-sm">Close</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDmKvSrxPI0dWcRkQZGz35x-amxYmtP40Y",
            authDomain: "offscript-nfc-landing.firebaseapp.com",
            projectId: "offscript-nfc-landing",
            storageBucket: "offscript-nfc-landing.firebasestorage.app",
            messagingSenderId: "848744026936",
            appId: "1:848744026936:web:4ce059f847d7763da0e7cd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        const yearEl = document.getElementById('year');
        if (yearEl) yearEl.innerText = new Date().getFullYear();
        
        const venueId = 'the-red-lion-cromer';
        const DAILY_LIMIT = 50; 
        let currentVenueData = null;

        window.goToGoogle = () => {
            if (currentVenueData?.googleReviewLink) {
                window.location.href = currentVenueData.googleReviewLink;
            } else {
                console.warn("Google review link not configured.");
            }
        };

        window.showWifiModal = () => {
            const modal = document.getElementById('wifi-modal');
            const netDisp = document.getElementById('wifi-network-display');
            const passDisp = document.getElementById('wifi-password-display');
            if (modal) modal.classList.remove('hidden');
            if (netDisp && currentVenueData) netDisp.innerText = currentVenueData.wifiNetwork || "N/A";
            if (passDisp && currentVenueData) passDisp.innerText = currentVenueData.wifiPassword || "N/A";
        };

        async function loadData() {
            try {
                const snap = await getDoc(doc(db, "venues", venueId));
                if (snap.exists()) {
                    currentVenueData = snap.data();
                    const nameEl = document.getElementById('venue-name');
                    const offerEl = document.getElementById('vip-offer-text');
                    const coverEl = document.getElementById('venue-cover');
                    const bookEl = document.getElementById('book-table-link');
                    const instaEl = document.getElementById('instagram-link');
                    
                    if (nameEl) nameEl.innerText = currentVenueData.venueName;
                    if (offerEl) offerEl.innerText = currentVenueData.vipOfferText;
                    if (coverEl) coverEl.src = currentVenueData.coverImageUrl;
                    if (bookEl) bookEl.href = currentVenueData.bookingLink;
                    if (instaEl) instaEl.href = currentVenueData.instagramLink;
                    
                    const logoImg = document.getElementById('venue-logo-img');
                    const logoText = document.getElementById('venue-logo-text');
                    
                    if (currentVenueData.logoUrl && currentVenueData.logoUrl.trim() !== "") {
                        logoImg.src = currentVenueData.logoUrl;
                        logoImg.classList.remove('hidden');
                        if (logoText) logoText.classList.add('hidden');
                    } else {
                        logoImg.classList.add('hidden');
                        if (logoText) logoText.classList.remove('hidden');
                        logoText.innerText = currentVenueData.venueName ? currentVenueData.venueName.substring(0, 2) : "VR";
                    }
                }
            } catch (e) { console.error(e); }
        }
        loadData();

        window.handleVipSubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('vip-email').value;
            const consent = document.getElementById('vip-consent').checked;
            
            const today = new Date().toISOString().split('T')[0];
            const q = query(collection(db, "vouchers_issued"), where("venueId", "==", venueId), where("date", "==", today));
            const snap = await getDocs(q);
            
            if (snap.size >= DAILY_LIMIT) {
                const form = document.getElementById('vip-form');
                const limit = document.getElementById('vip-limit');
                if (form) form.classList.add('hidden');
                if (limit) limit.classList.remove('hidden');
                return;
            }

            await addDoc(collection(db, "mailing_list"), { 
                venueId, 
                email, 
                marketingConsent: consent,
                timestamp: serverTimestamp() 
            });

            await addDoc(collection(db, "vouchers_issued"), { venueId, date: today, timestamp: serverTimestamp() });
            
            const form = document.getElementById('vip-form');
            const success = document.getElementById('vip-success');
            const codeDisp = document.getElementById('voucher-code-display');
            const detailsDisp = document.getElementById('voucher-details');
            const termsDisp = document.getElementById('voucher-terms');

            if (form) form.classList.add('hidden');
            if (success) success.classList.remove('hidden');
            if (codeDisp) codeDisp.innerText = currentVenueData.voucherCode;
            if (detailsDisp) detailsDisp.innerText = currentVenueData.voucherDetails || "";
            if (termsDisp) termsDisp.innerText = currentVenueData.voucherTerms || "";
        };

        window.showComplaintForm = () => {
            const btns = document.getElementById('feedback-buttons');
            const form = document.getElementById('complaint-form');
            if (btns) btns.classList.add('hidden');
            if (form) form.classList.remove('hidden');
        };

        window.handleComplaintSubmit = async (e) => {
            e.preventDefault();
            await addDoc(collection(db, "complaints"), {
                venueId,
                name: document.getElementById('complaint-name').value,
                email: document.getElementById('complaint-email').value,
                text: document.getElementById('complaint-text').value,
                timestamp: serverTimestamp()
            });
            const form = document.getElementById('complaint-form');
            if (form) form.innerHTML = '<p class="text-center font-bold py-4">Feedback Sent. Thank you.</p>';
        };
    </script>
</body>
</html>
