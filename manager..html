<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venue Manager Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">
    <div class="max-w-2xl mx-auto">
        <header class="mb-8">
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Venue Manager</h1>
            <p class="text-slate-500 mt-1">Update live rewards and voucher details for your venue.</p>
        </header>

        <div class="glass-panel border border-slate-200 rounded-3xl shadow-sm p-6 md:p-8">
            <form id="manager-form" class="space-y-6">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Venue ID</label>
                    <input type="text" id="m-venue-id" value="the-red-lion-cromer" class="w-full px-4 py-3 bg-slate-100 border-none rounded-xl text-slate-500 cursor-not-allowed" readonly>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="md:col-span-2">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">VIP Offer Text</label>
                        <input type="text" id="m-vip-offer" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Voucher Code</label>
                        <input type="text" id="m-voucher-code" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all font-mono font-bold">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Voucher Details</label>
                        <input type="text" id="m-voucher-details" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Voucher Terms</label>
                    <textarea id="m-voucher-terms" rows="3" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all"></textarea>
                </div>

                <button type="submit" id="save-btn" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 rounded-xl transition-all active:scale-[0.99] shadow-lg">Save Changes</button>
            </form>
            <p id="status" class="mt-6 text-center text-sm font-bold text-slate-400"></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getFirestore, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDmKvSrxPI0dWcRkQZGz35x-amxYmtP40Y",
            authDomain: "offscript-nfc-landing.firebaseapp.com",
            projectId: "offscript-nfc-landing",
            storageBucket: "offscript-nfc-landing.firebasestorage.app",
            messagingSenderId: "848744026936",
            appId: "1:848744026936:web:4ce059f847d7763da0e7cd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const form = document.getElementById('manager-form');
        const status = document.getElementById('status');
        const venueId = document.getElementById('m-venue-id').value;

        async function load() {
            try {
                const snap = await getDoc(doc(db, "venues", venueId));
                if(snap.exists()){
                    const d = snap.data();
                    document.getElementById('m-vip-offer').value = d.vipOfferText || '';
                    document.getElementById('m-voucher-code').value = d.voucherCode || '';
                    document.getElementById('m-voucher-details').value = d.voucherDetails || '';
                    document.getElementById('m-voucher-terms').value = d.voucherTerms || '';
                }
            } catch (e) {
                status.innerText = "Error loading venue data.";
            }
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            btn.innerText = "Saving...";
            status.innerText = "";
            
            try {
                await updateDoc(doc(db, "venues", venueId), {
                    vipOfferText: document.getElementById('m-vip-offer').value,
                    voucherCode: document.getElementById('m-voucher-code').value,
                    voucherDetails: document.getElementById('m-voucher-details').value,
                    voucherTerms: document.getElementById('m-voucher-terms').value
                });
                status.innerText = "✓ Saved successfully";
            } catch (err) {
                status.innerText = "✕ Error saving data. Please check connection.";
            } finally {
                btn.disabled = false;
                btn.innerText = "Save Changes";
            }
        };

        load();
    </script>
</body>
</html>
