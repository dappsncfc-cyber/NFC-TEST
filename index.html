<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Welcome to the Red Lion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: #f8fafc; 
            min-height: 100vh;
            position: relative;
        }
        /* Elegant ambient glow behind the app content */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: 
                radial-gradient(circle at 80% 10%, rgba(14, 165, 233, 0.08) 0%, transparent 45%),
                radial-gradient(circle at 10% 80%, rgba(99, 102, 241, 0.08) 0%, transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(244, 63, 94, 0.03) 0%, transparent 50%);
            z-index: -1;
        }
        /* High-end glass card with subtle internal shadow and crisp light borders */
        .glass-card { 
            background: rgba(255, 255, 255, 0.82); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.7); 
            box-shadow: 
                0 10px 30px -10px rgba(15, 23, 42, 0.04),
                0 1px 3px rgba(15, 23, 42, 0.02),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }
        /* Premium custom focus rings and states for inputs */
        .glass-input { 
            background: rgba(255, 255, 255, 0.6); 
            border: 1px solid rgba(15, 23, 42, 0.08); 
            box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.02);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.95);
            border-color: #0f172a;
            box-shadow: 0 0 0 4px rgba(15, 23, 42, 0.05);
            outline: none;
        }
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { display: none; }
        
        /* Premium tactile physics-based button scale down when touched */
        .btn-press {
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.15s, box-shadow 0.15s;
        }
        .btn-press:active {
            transform: scale(0.97);
        }
        /* Animated radar pulse ring on Wi-Fi icon */
        @keyframes radar-pulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            100% { transform: scale(1.4); opacity: 0; }
        }
        .radar-ring {
            animation: radar-pulse 2s cubic-bezier(0.16, 1, 0.3, 1) infinite;
        }
    </style>
</head>
<body class="flex justify-center min-h-screen text-slate-800 antialiased overflow-x-hidden">

    <div class="w-full max-w-md bg-transparent min-h-screen relative pb-12 shadow-2xl shadow-slate-900/5 overflow-hidden z-10">
        
        <!-- Luxury Header Frame -->
        <header class="relative h-64 flex flex-col justify-end px-6 pb-8">
            <div class="absolute inset-0 z-0">
                <img id="venue-cover" src="https://placehold.co/600x400/slate/white?text=Loading" alt="Venue Cover" class="w-full h-full object-cover">
                <!-- Clean multi-layered dark gradient to ensure high readability -->
                <div class="absolute inset-0 bg-gradient-to-t from-[#f8fafc] via-black/20 to-black/10"></div>
                <div class="absolute inset-0 bg-black/10"></div>
            </div>
            
            <div class="relative z-10 flex items-end gap-4 w-full">
                <!-- Brand Profile Image Box -->
                <div class="relative w-20 h-20 bg-white/95 backdrop-blur-md rounded-[22px] flex items-center justify-center shadow-xl border border-white p-2 overflow-hidden flex-shrink-0">
                    <span id="venue-logo-text" class="text-slate-900 font-extrabold text-xs tracking-wider text-center">...</span>
                    <img id="venue-logo-img" src="" alt="Logo" class="w-full h-full object-contain hidden">
                </div>
                <div class="pb-1">
                    <h1 id="venue-name" class="text-2xl font-black text-white tracking-tight drop-shadow-md">Loading...</h1>
                </div>
            </div>
        </header>

        <!-- Dynamic Main Concierge Layout -->
        <main class="relative z-10 px-5 space-y-5 -mt-4">
            
            <!-- Wi-Fi Smart Panel -->
            <div class="grid grid-cols-2 gap-4">
                <button id="show-wifi-btn" class="glass-card p-5 rounded-[28px] flex flex-col items-center justify-center gap-2 cursor-pointer col-span-2 text-center btn-press hover:bg-white transition-all">
                    <div class="relative w-12 h-12 bg-sky-50 rounded-full flex items-center justify-center text-sky-600 border border-sky-100">
                        <div class="absolute inset-0 bg-sky-100 rounded-full radar-ring"></div>
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6 relative z-10"><path fill-rule="evenodd" d="M1.371 8.143c5.858-5.857 15.356-5.857 21.213 0a.75.75 0 010 1.061l-1.414 1.414a.75.75 0 01-1.06 0c-4.686-4.686-12.284-4.686-16.97 0a.75.75 0 01-1.061 0l-1.414-1.414a.75.75 0 010-1.06zm3.182 3.182c4.1-4.1 10.749-4.1 14.849 0a.75.75 0 010 1.06l-1.414 1.415a.75.75 0 01-1.061 0 8.25 8.25 0 00-11.668 0 .75.75 0 01-1.06 0l-1.415-1.415a.75.75 0 010-1.06zm3.182 3.182c2.343-2.343 6.142-2.343 8.485 0a.75.75 0 010 1.06l-1.414 1.415a.75.75 0 01-1.061 0 3.75 3.75 0 00-5.304 0 .75.75 0 01-1.06 0l-1.415-1.415a.75.75 0 010-1.06zm3.182 3.182a1.5 1.5 0 012.122 0l1.414 1.414a1.5 1.5 0 01-2.122 2.121l-1.414-1.414a1.5 1.5 0 010-2.121z" clip-rule="evenodd" /></svg>
                    </div>
                    <div>
                        <h2 class="text-sm font-bold text-slate-900 tracking-tight">Guest Wi-Fi</h2>
                        <p class="text-xs text-slate-400 font-medium">Tap to reveal networks</p>
                    </div>
                </button>

                <!-- High-Converting Loyalty Form -->
                <section class="glass-card p-6 rounded-[28px] col-span-2 text-center">
                    <div class="flex flex-col items-center gap-2 mb-2">
                        <span class="text-xl">✨</span>
                        <h2 class="text-lg font-extrabold text-slate-900 tracking-tight">VIP Rewards</h2>
                    </div>
                    <p id="vip-offer-text" class="text-slate-500 text-sm mb-5 px-3 leading-relaxed">Enter your email to claim your reward.</p>
                    
                    <form id="vip-form" class="space-y-4">
                        <input type="email" name="email" required placeholder="Enter email address" class="w-full px-4 py-3.5 glass-input rounded-2xl text-sm text-center font-semibold text-slate-800">
                        <label class="flex justify-center items-center gap-3 cursor-pointer px-1">
                            <input type="checkbox" name="consent" required class="h-4 w-4 accent-slate-900 rounded border-slate-300">
                            <span class="text-[10px] text-slate-400 leading-normal text-left">I agree to receive news and exclusive offers from this venue.</span>
                        </label>
                        <button type="submit" class="w-full bg-slate-900 hover:bg-slate-850 text-white font-bold py-3.5 rounded-2xl shadow-md shadow-slate-950/10 transition-all btn-press">Reveal My Code</button>
                    </form>
                    
                    <!-- Reward Revealed Dashboard -->
                    <div id="vip-success" class="hidden text-center fade-in py-3">
                        <p class="text-[11px] font-extrabold uppercase text-amber-600 tracking-[0.2em] mb-1">Your Code</p>
                        <div id="voucher-code-display" class="w-full break-words text-3xl font-black py-2 font-mono tracking-widest text-slate-900 select-all"></div>
                        <p id="voucher-details" class="text-sm font-bold text-slate-850 mt-1"></p>
                        <p id="voucher-terms" class="text-[10px] text-slate-400 mt-4 italic leading-relaxed"></p>
                    </div>
                    
                    <!-- Cap Threshold Message -->
                    <div id="vip-limit" class="hidden text-center text-rose-600 py-4 font-bold text-sm">Daily reward limit reached. Please check back tomorrow!</div>
                </section>
            </div>

            <!-- Intelligent Sentiment Loop -->
            <section class="glass-card p-6 rounded-[28px]">
                <div id="feedback-buttons" class="space-y-3">
                    <h2 class="text-lg font-bold text-slate-900 text-center mb-3 tracking-tight">How was your visit?</h2>
                    <button id="google-review-btn" class="w-full bg-slate-900 hover:bg-slate-850 text-white font-bold py-3.5 rounded-2xl shadow-md shadow-slate-950/10 transition-all btn-press">🌟 I had a great time!</button>
                    <button id="show-complaint-btn" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3.5 rounded-2xl border border-slate-200/50 transition-all btn-press">💬 I have a suggestion</button>
                </div>
                
                <!-- Silent Suggestion Input Frame -->
                <form id="complaint-form" class="hidden space-y-3.5 fade-in">
                    <textarea name="text" required placeholder="What's your suggestion?" class="w-full p-3.5 glass-input rounded-2xl text-sm h-24 resize-none leading-relaxed text-slate-800"></textarea>
                    <input type="text" name="name" required placeholder="Your Name" class="w-full p-3.5 glass-input rounded-2xl text-sm font-medium text-slate-800">
                    <input type="email" name="email" required placeholder="Your Email" class="w-full p-3.5 glass-input rounded-2xl text-sm font-medium text-slate-800">
                    <button type="submit" class="w-full bg-slate-900 hover:bg-slate-850 text-white font-bold py-3.5 rounded-2xl transition-all btn-press">Send Message</button>
                </form>
            </section>

            <!-- Grid-Based Concierge Pathways -->
            <section class="grid grid-cols-2 gap-4">
                <a href="#" id="book-table-link" target="_blank" class="glass-card p-4 flex flex-col items-center justify-center gap-2.5 text-center rounded-[28px] h-28 btn-press hover:bg-white transition-all">
                    <div class="w-10 h-10 rounded-2xl bg-emerald-50 flex items-center justify-center text-emerald-600 border border-emerald-100 shadow-sm shadow-emerald-100/30">
                        <span class="text-xl">📅</span>
                    </div>
                    <span class="text-xs font-bold text-slate-700">Book a Table</span>
                </a>
                
                <a href="https://www.redlioncromer.co.uk/rooms/" target="_blank" class="glass-card p-4 flex flex-col items-center justify-center gap-2.5 text-center rounded-[28px] h-28 btn-press hover:bg-white transition-all">
                    <div class="w-10 h-10 rounded-2xl bg-indigo-50 flex items-center justify-center text-indigo-600 border border-indigo-100 shadow-sm shadow-indigo-100/30">
                        <span class="text-xl">🛏️</span>
                    </div>
                    <span class="text-xs font-bold text-slate-700">Book a Room</span>
                </a>
                
                <a href="https://www.redlioncromer.co.uk/menus/" target="_blank" class="glass-card p-4 flex flex-col items-center justify-center gap-2.5 text-center rounded-[28px] h-28 btn-press hover:bg-white transition-all">
                    <div class="w-10 h-10 rounded-2xl bg-rose-50 flex items-center justify-center text-rose-600 border border-rose-100 shadow-sm shadow-rose-100/30">
                        <span class="text-xl">🍽️</span>
                    </div>
                    <span class="text-xs font-bold text-slate-700">Menus</span>
                </a>
                
                <a href="#" id="instagram-link" target="_blank" class="glass-card p-4 flex flex-col items-center justify-center gap-2.5 text-center rounded-[28px] h-28 btn-press hover:bg-white transition-all">
                    <div class="w-10 h-10 rounded-2xl bg-pink-50 flex items-center justify-center border border-pink-100 shadow-sm shadow-pink-100/30">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/9/95/Instagram_logo_2022.svg" class="w-5 h-5 opacity-80">
                    </div>
                    <span class="text-xs font-bold text-slate-700">Instagram</span>
                </a>
            </section>
        </main>
        
        <footer class="text-center pt-8 pb-4">
            <p class="text-[10px] text-slate-400 font-medium">&copy; <span id="year"></span> <a href="https://www.offscriptlabs.co.uk" target="_blank" class="hover:underline hover:text-slate-600">Offscript Labs</a></p>
        </footer>
    </div>

    <!-- Enhanced Premium Wi-Fi Modal Overlay -->
    <div id="wifi-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/25 backdrop-blur-md">
        <div class="glass-card p-8 rounded-[36px] w-full max-w-xs text-center border border-white/60 shadow-2xl">
            <div class="w-12 h-12 bg-sky-50 rounded-2xl flex items-center justify-center text-sky-600 mx-auto mb-4 border border-sky-100/50">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 21v-4.875c0-.621.504-1.125 1.125-1.125h5.25c.621 0 1.125.504 1.125 1.125V21m0 0h4.5V3.545M12.75 21h7.5V10.75M2.25 21h1.5m18 0h-18M2.25 9l4.5-1.636M18.75 3l-1.5.545m0 6.205l3 1M5.25 10.75a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm3.75-3a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm3.75-3a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm3.75-3a.75.75 0 11-1.5 0 .75.75 0 011.5 0z" /></svg>
            </div>
            <h3 class="font-black text-slate-900 text-lg mb-1 tracking-tight">Wi-Fi Network</h3>
            <p id="wifi-network-display" class="text-sm font-bold text-slate-500 mb-4"></p>
            
            <h3 class="font-black text-slate-900 text-lg mb-1 tracking-tight">Password</h3>
            <div class="bg-slate-50 border border-slate-100 rounded-2xl py-3 px-4 mb-6 select-all transition-colors active:bg-slate-100">
                <p id="wifi-password-display" class="text-lg font-mono font-black text-slate-850 tracking-wide">...</p>
            </div>
            
            <button onclick="document.getElementById('wifi-modal').classList.add('hidden')" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3.5 rounded-2xl text-sm transition-all btn-press">Close</button>
        </div>
    </div>

    <!-- Custom Premium Toast Overlay (Ensuring seamless visual alerts in iframes) -->
    <div id="toast-message" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 z-50 bg-slate-900/95 text-white font-semibold text-sm px-5 py-3.5 rounded-2xl shadow-xl flex items-center gap-2 fade-in backdrop-blur">
        <span class="text-amber-400">⚠️</span>
        <span id="toast-text"></span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        (async function() {
            const firebaseConfig = {
                apiKey: "AIzaSyDmKvSrxPI0dWcRkQZGz35x-amxYmtP40Y",
                authDomain: "offscript-nfc-landing.firebaseapp.com",
                projectId: "offscript-nfc-landing",
                storageBucket: "offscript-nfc-landing.firebasestorage.app",
                messagingSenderId: "848744026936",
                appId: "1:848744026936:web:4ce059f847d7763da0e7cd"
            };

            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            
            const els = {
                year: document.getElementById('year'),
                venueName: document.getElementById('venue-name'),
                vipOffer: document.getElementById('vip-offer-text'),
                venueCover: document.getElementById('venue-cover'),
                bookLink: document.getElementById('book-table-link'),
                instaLink: document.getElementById('instagram-link'),
                logoImg: document.getElementById('venue-logo-img'),
                logoText: document.getElementById('venue-logo-text'),
                wifiModal: document.getElementById('wifi-modal'),
                wifiNet: document.getElementById('wifi-network-display'),
                wifiPass: document.getElementById('wifi-password-display'),
                vipForm: document.getElementById('vip-form'),
                vipSuccess: document.getElementById('vip-success'),
                vipLimit: document.getElementById('vip-limit'),
                voucherCode: document.getElementById('voucher-code-display'),
                voucherDetails: document.getElementById('voucher-details'),
                voucherTerms: document.getElementById('voucher-terms'),
                feedbackBtns: document.getElementById('feedback-buttons'),
                complaintForm: document.getElementById('complaint-form'),
                googleBtn: document.getElementById('google-review-btn'),
                wifiBtn: document.getElementById('show-wifi-btn'),
                complaintBtn: document.getElementById('show-complaint-btn')
            };

            if (els.year) els.year.innerText = new Date().getFullYear();
            
            const urlParams = new URLSearchParams(window.location.search);
            const venueId = urlParams.get('venueId') || 'the-red-lion-cromer';
            let currentVenueData = null;

            const setHidden = (el, shouldHide) => el?.classList.toggle('hidden', shouldHide);
            
            const showToast = (msg) => {
                const toast = document.getElementById('toast-message');
                const txt = document.getElementById('toast-text');
                if (toast && txt) {
                    txt.innerText = msg;
                    toast.classList.remove('hidden');
                    setTimeout(() => toast.classList.add('hidden'), 3500);
                }
            };

            const setBtnLoading = (btn, isLoading) => {
                if (!btn) return;
                btn.disabled = isLoading;
                btn.style.opacity = isLoading ? "0.6" : "1";
                btn.style.cursor = isLoading ? "not-allowed" : "pointer";
            };

            const handleGoToGoogle = () => {
                const link = currentVenueData?.googleReviewLink;
                if (link) window.open(link, '_blank');
                else showToast("Google review link is not configured.");
            };

            const handleBookTable = (e) => {
                const link = currentVenueData?.bookingLink;
                if (!link || link === "#") {
                    e.preventDefault();
                    showToast("Booking link is not configured.");
                }
            };

            const toggleWifiModal = (show) => {
                setHidden(els.wifiModal, !show);
                if (show && currentVenueData) {
                    if (els.wifiNet) els.wifiNet.innerText = currentVenueData.wifiNetwork || "N/A";
                    if (els.wifiPass) els.wifiPass.innerText = currentVenueData.wifiPassword || "N/A";
                }
            };

            async function loadVenueData() {
                try {
                    const snap = await getDoc(doc(db, "venues", venueId));
                    if (!snap.exists()) throw new Error("Venue not found");

                    currentVenueData = snap.data();
                    if (els.venueName) els.venueName.innerText = currentVenueData.venueName;
                    if (els.vipOffer) els.vipOffer.innerText = currentVenueData.vipOfferText;
                    if (els.venueCover) els.venueCover.src = currentVenueData.coverImageUrl;
                    if (els.bookLink) els.bookLink.href = currentVenueData.bookingLink || "#";
                    if (els.instaLink) els.instaLink.href = currentVenueData.instagramLink || "#";
                    
                    const hasLogo = !!currentVenueData.logoUrl?.trim();
                    setHidden(els.logoImg, !hasLogo);
                    setHidden(els.logoText, hasLogo);
                    if (hasLogo && els.logoImg) els.logoImg.src = currentVenueData.logoUrl;
                    else if (els.logoText) els.logoText.innerText = currentVenueData.venueName?.substring(0, 2) || "RL";
                } catch (e) { 
                    console.error("Error loading venue data:", e); 
                }
            }
            
            const handleVipSubmit = async (e) => {
                e.preventDefault();
                const form = e.target;
                const submitBtn = form.querySelector('button[type="submit"]');
                const formData = new FormData(form);
                const email = formData.get('email');
                const consent = formData.get('consent') === 'on';

                setBtnLoading(submitBtn, true);
                try {
                    const today = new Date().toISOString().split('T')[0];
                    const dailyLimit = currentVenueData.dailyVoucherLimit || 50; 
                    const q = query(collection(db, "vouchers_issued"), where("venueId", "==", venueId), where("date", "==", today));
                    const snap = await getDocs(q);
                    
                    if (snap.size >= dailyLimit) {
                        setHidden(els.vipForm, true);
                        setHidden(els.vipLimit, false);
                        return;
                    }

                    await Promise.all([
                        addDoc(collection(db, "mailing_list"), { venueId, email, marketingConsent: consent, timestamp: serverTimestamp() }),
                        addDoc(collection(db, "vouchers_issued"), { venueId, date: today, timestamp: serverTimestamp() })
                    ]);
                    
                    setHidden(els.vipForm, true);
                    setHidden(els.vipSuccess, false);
                    if (els.voucherCode) els.voucherCode.innerText = currentVenueData.voucherCode || "N/A";
                    if (els.voucherDetails) els.voucherDetails.innerText = currentVenueData.voucherDetails || "";
                    if (els.voucherTerms) els.voucherTerms.innerText = currentVenueData.voucherTerms || "";
                } catch (e) {
                    showToast("Failed to claim reward. Please try again.");
                } finally {
                    setBtnLoading(submitBtn, false);
                }
            };

            const handleComplaintSubmit = async (e) => {
                e.preventDefault();
                const form = e.target;
                const submitBtn = form.querySelector('button[type="submit"]');
                const formData = new FormData(form);

                setBtnLoading(submitBtn, true);
                try {
                    await addDoc(collection(db, "complaints"), {
                        venueId,
                        name: formData.get('name'),
                        email: formData.get('email'),
                        text: formData.get('text'),
                        timestamp: serverTimestamp()
                    });
                    form.innerHTML = '<p class="text-center font-bold py-4">Message Sent. Thank you.</p>';
                } catch (e) {
                    showToast("Failed to send message.");
                } finally {
                    setBtnLoading(submitBtn, false);
                }
            };

            els.googleBtn?.addEventListener('click', handleGoToGoogle);
            els.bookLink?.addEventListener('click', handleBookTable);
            els.wifiBtn?.addEventListener('click', () => toggleWifiModal(true));
            els.wifiModal?.addEventListener('click', (e) => { if (e.target === els.wifiModal) toggleWifiModal(false); });
            els.complaintBtn?.addEventListener('click', () => { setHidden(els.feedbackBtns, true); setHidden(els.complaintForm, false); });
            els.vipForm?.addEventListener('submit', handleVipSubmit);
            els.complaintForm?.addEventListener('submit', handleComplaintSubmit);

            loadVenueData();
        })();
    </script>
</body>
</html>
