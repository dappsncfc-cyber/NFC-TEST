<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Welcome to the Red Lion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f2f5; }
        .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.05); }
        .glass-input { background: rgba(255, 255, 255, 0.5); border: 1px solid rgba(255, 255, 255, 0.8); }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex justify-center min-h-screen text-slate-800 antialiased overflow-x-hidden">

    <div class="w-full max-w-md bg-transparent min-h-screen relative pb-12 shadow-2xl overflow-hidden z-10">
        <header class="relative h-64 flex flex-col justify-end px-6 pb-8">
            <div class="absolute inset-0 z-0">
                <img id="venue-cover" src="https://placehold.co/600x400/slate/white?text=Loading" alt="Venue Cover" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-[#f0f2f5] via-black/30 to-black/10"></div>
            </div>
            <div class="relative z-10 flex items-end gap-4 w-full">
                <div class="w-20 h-20 bg-white/90 backdrop-blur-md rounded-[20px] flex items-center justify-center shadow-lg border border-white/50 p-2 overflow-hidden">
                    <span id="venue-logo-text" class="text-gray-900 font-bold text-sm tracking-widest text-center">...</span>
                    <img id="venue-logo-img" src="" alt="Logo" class="w-full h-full object-contain hidden">
                </div>
                <div class="pb-1">
                    <h1 id="venue-name" class="text-2xl font-black text-white tracking-tight drop-shadow-md">Loading...</h1>
                </div>
            </div>
        </header>

        <main class="relative z-10 px-5 space-y-6 -mt-4">
            <div class="grid grid-cols-2 gap-4">
                <button id="show-wifi-btn" class="glass-card p-4 rounded-[24px] flex flex-col items-center justify-center gap-2 cursor-pointer active:scale-[0.98] transition-transform col-span-2 text-center">
                    <div class="w-12 h-12 bg-sky-50 rounded-full flex items-center justify-center text-sky-600">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6"><path fill-rule="evenodd" d="M1.371 8.143c5.858-5.857 15.356-5.857 21.213 0a.75.75 0 010 1.061l-1.414 1.414a.75.75 0 01-1.06 0c-4.686-4.686-12.284-4.686-16.97 0a.75.75 0 01-1.061 0l-1.414-1.414a.75.75 0 010-1.06zm3.182 3.182c4.1-4.1 10.749-4.1 14.849 0a.75.75 0 010 1.06l-1.414 1.415a.75.75 0 01-1.061 0 8.25 8.25 0 00-11.668 0 .75.75 0 01-1.06 0l-1.415-1.415a.75.75 0 010-1.06zm3.182 3.182c2.343-2.343 6.142-2.343 8.485 0a.75.75 0 010 1.06l-1.414 1.415a.75.75 0 01-1.061 0 3.75 3.75 0 00-5.304 0 .75.75 0 01-1.06 0l-1.415-1.415a.75.75 0 010-1.06zm3.182 3.182a1.5 1.5 0 012.122 0l1.414 1.414a1.5 1.5 0 01-2.122 2.121l-1.414-1.414a1.5 1.5 0 010-2.121z" clip-rule="evenodd" /></svg>
                    </div>
                    <div>
                        <h2 class="text-sm font-bold text-slate-900">Guest Wi-Fi</h2>
                        <p class="text-xs text-slate-500">Tap for details</p>
                    </div>
                </button>

                <section class="glass-card p-6 rounded-[28px] col-span-2 text-center">
                    <div class="flex flex-col items-center gap-2 mb-2"><span class="text-xl">✨</span><h2 class="text-lg font-bold text-slate-900">VIP Rewards</h2></div>
                    <p id="vip-offer-text" class="text-slate-600 text-sm mb-4">Enter your email to claim your reward.</p>
                    <form id="vip-form" class="space-y-3">
                        <input type="email" name="email" required placeholder="Enter email address" class="w-full px-4 py-3 glass-input rounded-xl text-sm text-center">
                        <label class="flex justify-center gap-2 items-start cursor-pointer"><input type="checkbox" name="consent" required class="mt-1"><span class="text-[10px] text-slate-500">I agree to receive news and exclusive offers from this venue.</span></label>
                        <button type="submit" class="w-full bg-slate-900 text-white font-bold py-3 rounded-xl">Reveal My Code</button>
                    </form>
                    <div id="vip-success" class="hidden text-center fade-in py-4">
                        <p class="text-xs font-bold uppercase text-amber-600 tracking-widest">Your Code</p>
                        <div id="voucher-code-display" class="w-full break-words text-3xl font-black py-2 font-mono tracking-widest"></div>
                        <p id="voucher-details" class="text-sm font-semibold text-slate-800 mt-1"></p>
                        <p id="voucher-terms" class="text-[10px] text-slate-500 mt-3 italic"></p>
                    </div>
                    <div id="vip-limit" class="hidden text-center text-rose-600 py-4 font-bold text-sm">Daily reward limit reached. Please check back tomorrow!</div>
                </section>
            </div>

            <section class="glass-card p-6 rounded-[28px]">
                <div id="feedback-buttons" class="space-y-3">
                    <h2 class="text-lg font-bold text-slate-900 text-center mb-2">How was your visit?</h2>
                    <button id="google-review-btn" class="w-full bg-slate-100 text-slate-700 font-bold py-3 rounded-xl border border-slate-200">🌟 I had a great time!</button>
                    <button id="show-complaint-btn" class="w-full bg-slate-100 text-slate-700 font-bold py-3 rounded-xl border border-slate-200">💬 I have a suggestion</button>
                </div>
                <form id="complaint-form" class="hidden space-y-3 fade-in">
                    <textarea name="text" required placeholder="What's your suggestion?" class="w-full p-3 glass-input rounded-xl text-sm"></textarea>
                    <input type="text" name="name" required placeholder="Your Name" class="w-full p-3 glass-input rounded-xl text-sm">
                    <input type="email" name="email" required placeholder="Your Email" class="w-full p-3 glass-input rounded-xl text-sm">
                    <button type="submit" class="w-full bg-slate-900 text-white font-bold py-3 rounded-xl">Send Message</button>
                </form>
            </section>

            <section class="grid grid-cols-2 gap-4">
                <a href="#" id="book-table-link" class="glass-card p-4 flex flex-col items-center justify-center gap-1 text-center rounded-[24px] h-24">
                    <span class="text-xl">📅</span>
                    <span class="text-xs font-bold">Book a Table</span>
                </a>
                <a href="https://www.redlioncromer.co.uk/rooms/" target="_blank" class="glass-card p-4 flex flex-col items-center justify-center gap-1 text-center rounded-[24px] h-24">
                    <span class="text-xl">🛏️</span>
                    <span class="text-xs font-bold">Book a Room</span>
                </a>
                <a href="https://www.redlioncromer.co.uk/menus/" target="_blank" class="glass-card p-4 flex flex-col items-center justify-center gap-1 text-center rounded-[24px] h-24">
                    <span class="text-xl">🍽️</span>
                    <span class="text-xs font-bold">Menus</span>
                </a>
                <a href="#" id="instagram-link" target="_blank" class="glass-card p-4 flex flex-col items-center justify-center gap-1 text-center rounded-[24px] h-24">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/9/95/Instagram_logo_2022.svg" class="w-5 h-5 opacity-70">
                    <span class="text-xs font-bold">Instagram</span>
                </a>
            </section>
        </main>
        
        <footer class="text-center pt-8 pb-4">
            <p class="text-[10px] text-slate-400">&copy; <span id="year"></span> <a href="https://www.offscriptlabs.co.uk" target="_blank" class="hover:underline">Offscript Labs</a></p>
        </footer>
    </div>

    <div id="wifi-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="glass-card p-6 rounded-2xl w-full max-w-xs text-center">
            <h3 class="font-bold mb-1">Wi-Fi Network</h3>
            <p id="wifi-network-display" class="text-sm text-slate-600 mb-4"></p>
            <h3 class="font-bold mb-1">Password</h3>
            <p id="wifi-password-display" class="text-2xl font-mono font-bold mb-6">...</p>
            <button onclick="document.getElementById('wifi-modal').classList.add('hidden')" class="w-full bg-slate-900 text-white font-bold py-2 rounded-lg text-sm">Close</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        (async function() {
            const firebaseConfig = {
                apiKey: "AIzaSyDmKvSrxPI0dWcRkQZGz35x-amxYmtP40Y",
                authDomain: "offscript-nfc-landing.firebaseapp.com",
                projectId: "offscript-nfc-landing",
                storageBucket: "offscript-nfc-landing.firebasestorage.app",
                messagingSenderId: "848744026936",
                appId: "1:848744026936:web:4ce059f847d7763da0e7cd"
            };

            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            
            const els = {
                year: document.getElementById('year'),
                venueName: document.getElementById('venue-name'),
                vipOffer: document.getElementById('vip-offer-text'),
                venueCover: document.getElementById('venue-cover'),
                bookLink: document.getElementById('book-table-link'),
                instaLink: document.getElementById('instagram-link'),
                logoImg: document.getElementById('venue-logo-img'),
                logoText: document.getElementById('venue-logo-text'),
                wifiModal: document.getElementById('wifi-modal'),
                wifiNet: document.getElementById('wifi-network-display'),
                wifiPass: document.getElementById('wifi-password-display'),
                vipForm: document.getElementById('vip-form'),
                vipSuccess: document.getElementById('vip-success'),
                vipLimit: document.getElementById('vip-limit'),
                voucherCode: document.getElementById('voucher-code-display'),
                voucherDetails: document.getElementById('voucher-details'),
                voucherTerms: document.getElementById('voucher-terms'),
                feedbackBtns: document.getElementById('feedback-buttons'),
                complaintForm: document.getElementById('complaint-form'),
                googleBtn: document.getElementById('google-review-btn'),
                wifiBtn: document.getElementById('show-wifi-btn'),
                complaintBtn: document.getElementById('show-complaint-btn')
            };

            if (els.year) els.year.innerText = new Date().getFullYear();
            
            const urlParams = new URLSearchParams(window.location.search);
            const venueId = urlParams.get('venueId') || 'the-red-lion-cromer';
            const DAILY_LIMIT = 50; 
            let currentVenueData = null;

            const setHidden = (el, shouldHide) => el?.classList.toggle('hidden', shouldHide);
            
            const setBtnLoading = (btn, isLoading) => {
                if (!btn) return;
                btn.disabled = isLoading;
                btn.style.opacity = isLoading ? "0.6" : "1";
                btn.style.cursor = isLoading ? "not-allowed" : "pointer";
            };

            const handleGoToGoogle = () => {
                const link = currentVenueData?.googleReviewLink;
                if (link) window.location.href = link;
                else alert("Google review link is not configured.");
            };

            const toggleWifiModal = (show) => {
                setHidden(els.wifiModal, !show);
                if (show && currentVenueData) {
                    if (els.wifiNet) els.wifiNet.innerText = currentVenueData.wifiNetwork || "N/A";
                    if (els.wifiPass) els.wifiPass.innerText = currentVenueData.wifiPassword || "N/A";
                }
            };

            async function loadVenueData() {
                try {
                    const snap = await getDoc(doc(db, "venues", venueId));
                    if (!snap.exists()) throw new Error("Venue not found");

                    currentVenueData = snap.data();
                    if (els.venueName) els.venueName.innerText = currentVenueData.venueName;
                    if (els.vipOffer) els.vipOffer.innerText = currentVenueData.vipOfferText;
                    if (els.venueCover) els.venueCover.src = currentVenueData.coverImageUrl;
                    if (els.bookLink) els.bookLink.href = currentVenueData.bookingLink;
                    if (els.instaLink) els.instaLink.href = currentVenueData.instagramLink;
                    
                    const hasLogo = !!currentVenueData.logoUrl?.trim();
                    setHidden(els.logoImg, !hasLogo);
                    setHidden(els.logoText, hasLogo);
                    if (hasLogo && els.logoImg) els.logoImg.src = currentVenueData.logoUrl;
                    else if (els.logoText) els.logoText.innerText = currentVenueData.venueName?.substring(0, 2) || "VR";
                } catch (e) { 
                    console.error("Error loading venue data:", e); 
                }
            }
            
            const handleVipSubmit = async (e) => {
                e.preventDefault();
                const form = e.target;
                const submitBtn = form.querySelector('button[type="submit"]');
                const formData = new FormData(form);
                const email = formData.get('email');
                const consent = formData.get('consent') === 'on';

                setBtnLoading(submitBtn, true);
                try {
                    const today = new Date().toISOString().split('T')[0];
                    const q = query(collection(db, "vouchers_issued"), where("venueId", "==", venueId), where("date", "==", today));
                    const snap = await getDocs(q);
                    
                    if (snap.size >= DAILY_LIMIT) {
                        setHidden(els.vipForm, true);
                        setHidden(els.vipLimit, false);
                        return;
                    }

                    await Promise.all([
                        addDoc(collection(db, "mailing_list"), { venueId, email, marketingConsent: consent, timestamp: serverTimestamp() }),
                        addDoc(collection(db, "vouchers_issued"), { venueId, date: today, timestamp: serverTimestamp() })
                    ]);
                    
                    setHidden(els.vipForm, true);
                    setHidden(els.vipSuccess, false);
                    if (els.voucherCode) els.voucherCode.innerText = currentVenueData.voucherCode || "N/A";
                    if (els.voucherDetails) els.voucherDetails.innerText = currentVenueData.voucherDetails || "";
                    if (els.voucherTerms) els.voucherTerms.innerText = currentVenueData.voucherTerms || "";
                } catch (e) {
                    alert("Failed to claim reward. Please try again.");
                } finally {
                    setBtnLoading(submitBtn, false);
                }
            };

            const handleComplaintSubmit = async (e) => {
                e.preventDefault();
                const form = e.target;
                const submitBtn = form.querySelector('button[type="submit"]');
                const formData = new FormData(form);

                setBtnLoading(submitBtn, true);
                try {
                    await addDoc(collection(db, "complaints"), {
                        venueId,
                        name: formData.get('name'),
                        email: formData.get('email'),
                        text: formData.get('text'),
                        timestamp: serverTimestamp()
                    });
                    form.innerHTML = '<p class="text-center font-bold py-4">Message Sent. Thank you.</p>';
                } catch (e) {
                    alert("Failed to send message.");
                } finally {
                    setBtnLoading(submitBtn, false);
                }
            };

            els.googleBtn?.addEventListener('click', handleGoToGoogle);
            els.wifiBtn?.addEventListener('click', () => toggleWifiModal(true));
            els.wifiModal?.addEventListener('click', (e) => { if (e.target === els.wifiModal) toggleWifiModal(false); });
            els.complaintBtn?.addEventListener('click', () => { setHidden(els.feedbackBtns, true); setHidden(els.complaintForm, false); });
            els.vipForm?.addEventListener('submit', handleVipSubmit);
            els.complaintForm?.addEventListener('submit', handleComplaintSubmit);

            loadVenueData();
        })();
    </script>
</body>
</html>
